version: 2
updates:
  # npm-зависимости
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # dev-зависимости (линтеры, тесты, типы) обновляем одним PR
      dev-dependencies:
        dependency-type: development
      # минорные/патч обновления прод-зависимостей — тоже одним PR
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  # GitHub Actions в воркфлоу
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Базовый образ Dockerfile
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
